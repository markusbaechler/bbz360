<!DOCTYPE html>
<html lang="de-CH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bbz360 — Feedback</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script type="module" src="/src/modules/09-feedback.ts"></script>
</head>
<body class="bbz-app">
  <header class="bbz-topbar">
    <a class="bbz-logo" href="../index.html" title="Zurück zum Beratercockpit" aria-label="Zurück zum Beratercockpit">bbz</a>
    <nav class="bbz-nav" id="bbzNav" aria-label="Module"></nav>
    <button class="bbz-edit-toggle" id="editToggle" type="button" aria-pressed="false">✎ Bearbeiten</button>
  </header>

  <div class="bbz-main">
    <!-- SÄULE: Kontext + Phasenliste + Arbeitsstand -->
    <aside class="bbz-rail">
      <div>
        <div class="rail-kicker">09 · GESPRÄCHSABSCHLUSS</div>
        <h1 class="rail-title">Wie haben wir Ihre Erwartungen erfüllt?</h1>
        <p class="rail-sub" id="railSub">Sie haben zu Beginn etwas von sich geteilt. Jetzt ist der Moment, ehrlich Bilanz zu ziehen.</p>
      </div>
      <div class="fb-phaselist" id="railPhases"></div>
      <div class="rail-sect">
        <div class="rail-kicker">GESAMTEINDRUCK</div>
        <div class="rail-kpi-v" id="railAvg">–</div>
        <div class="rail-kpi-s" id="railAdj">Bewerten Sie links jede Erwartung</div>
      </div>
      <div class="rail-foot">Ihr Feedback ist ein Geschenk — es fliesst in jede künftige Begegnung ein.</div>
    </aside>

    <!-- BÜHNE: Phase 1 Erwartungsabgleich · Phase 2 Zwei Fragen zum Schluss -->
    <div class="bbz-stage">
      <div class="bbz-work fb-work" id="work"></div>
      <div class="bbz-bar"><div class="bbz-bar-in" id="barIn"></div></div>
    </div>
  </div>
</body>
</html>
